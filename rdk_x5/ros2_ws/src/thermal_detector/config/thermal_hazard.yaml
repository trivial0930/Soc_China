# Heat-source hazard fusion policy.
# Tunable thresholds for thermal/RGB fusion. Tune on real lab data (Phase 5).
# Mirrors thermal_detector.fusion.DEFAULT_POLICIES / HotspotParams.

# If false, ignore absolute degC (e.g. shiny low-emissivity metal under-reads)
# and rely on relative-hotspot overlap only.
trust_absolute: true

# Relative-hotspot detection.
hotspot:
  delta_c: 8.0            # how far above the scene baseline counts as hot
  abs_floor_c: 40.0       # never flag anything cooler than this
  baseline_percentile: 50 # scene baseline = this percentile of the frame
  min_area_px: 2          # ignore blobs smaller than this (sensor noise)
  orphan_critical_c: 70.0 # object-less hotspot at/above this is critical

# Per-class risk tier + temperature thresholds (degrees C).
# base_risk: high | medium | context
# active_c: at/above -> object is energised/in-use
# hot_c:    at/above -> dangerously hot
classes:
  soldering_iron:    { base_risk: high,    active_c: 50,  hot_c: 150 }
  hot_air_gun:       { base_risk: high,    active_c: 50,  hot_c: 150 }
  welding_gun:       { base_risk: high,    active_c: 50,  hot_c: 150 }
  exposed_wire:      { base_risk: high,    active_c: 45,  hot_c: 70 }
  power_strip:       { base_risk: medium,  active_c: 45,  hot_c: 80 }
  plug:              { base_risk: medium,  active_c: 45,  hot_c: 80 }
  power_adapter:     { base_risk: medium,  active_c: 45,  hot_c: 80 }
  wire:              { base_risk: context, active_c: 45,  hot_c: 70 }
  wire_bundle:       { base_risk: context, active_c: 45,  hot_c: 70 }
  soldering_station:  { base_risk: context, active_c: 50,  hot_c: 150 }
