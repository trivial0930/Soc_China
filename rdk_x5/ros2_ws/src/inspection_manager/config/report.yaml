# Layer 3 (on-demand cloud report) config.
report:
  # backend: "mock" (template, no model — default) | "cloud" (Qwen3-VL-Plus on Bailian)
  backend: mock
  # cloud model on Alibaba Cloud Bailian (DashScope). API key via env DASHSCOPE_API_KEY.
  model: "qwen3-vl-plus"
  # Rate limit: at most max_calls cloud reports per window_sec.
  max_calls: 5
  window_sec: 3600.0
