command_receiver_node:
  ros__parameters:
    # Management-app backend (same as uplink). Point at the Mac/edge IP:port.
    backend_url: "http://192.168.128.100:8000"
    ingest_token: ""              # match backend APP_INGEST_TOKEN (inject via -p at launch)
    poll_sec: 2.0                 # how often to pull pending commands
    pending_limit: 10
    # stations.yaml path (waypoints map): recheck_station / inspection_round / find_item(navigate).
    stations_config: ""
    # gimbal_aim.yaml path (station/location -> [pan,tilt]): laser_point / find_item(laser).
    gimbal_aim_config: ""
    voice_topic: "/inspection/voice"
    recheck_topic: "/inspection/recheck"
    request_report_topic: "/inspection/request_report"
    gimbal_topic: "/gimbal/target_angle"
    acceptance_request_topic: "/inspection/acceptance_request"
