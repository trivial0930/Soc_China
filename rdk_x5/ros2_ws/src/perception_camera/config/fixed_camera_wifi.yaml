fixed_camera_node:
  ros__parameters:
    source_uri: "rtsp://USER:PASSWORD@CAMERA_IP:554/stream1"
    frame_id: "fixed_wifi_monitor_cam"
    image_topic: "/fixed_camera/image_raw"
    camera_info_topic: "/fixed_camera/camera_info"
    status_topic: "/fixed_camera/status"
    width: 1280
    height: 720
    fps: 15.0
    reconnect_sec: 2.0
    rtsp_transport: "tcp"
    open_timeout_ms: 5000
    read_timeout_ms: 5000
    loop_file: true
    publish_camera_info: true
    snapshot_dir: ""
    snapshot_every_n_frames: 0
