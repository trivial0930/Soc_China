# RGB <-> Thermal spatial calibration (Phase 2).
# homography_thermal_to_rgb maps a THERMAL pixel (x,y) to its RGB pixel.
#
# Real calibration captured 2026-06-17 on the co-mounted RGB(1920x1072)+Thermal-90
# rig via thermal-hotspot<->detection-box correspondences (heat a known object,
# remove the heat source, snap the thermal argmax against the YOLO box centre).
# Solved as a robust AFFINE (cv2.estimateAffine2D, RANSAC) -- the scene is roughly
# planar at working distance and the two lenses are close, so an affine (6 DOF) is
# more stable than a full homography (8 DOF), which overfit the perspective terms.
# 4-inlier consensus, ~10 px reprojection in the central region (edges drift more,
# from lens distortion the affine can't model). Hardware-verified: a heated object
# is now attributed to its detection box (power_adapter "active" 64C) instead of
# surfacing as an orphan hotspot.
#
# Recapture if the cameras are re-mounted/moved. Bottom row stays [0,0,1] (affine).

rgb_width: 1920
rgb_height: 1072
thermal_width: 80
thermal_height: 62

calibrated: true
calibrated_at: 2026-06-17

# 3x3, row-major (affine: bottom row [0,0,1]).
homography_thermal_to_rgb:
  - [-31.731388, 15.249874, 1743.049067]
  - [1.926241, 13.123738, 106.823847]
  - [0.000000, 0.000000, 1.000000]
